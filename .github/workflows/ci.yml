name: "Create API CI"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  macos:
    name: macOS (Xcode 16.4)
    runs-on: macos-15
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
      - name: Run Tests
        run: swift test
      - name: Compile Generated Code
        run: ./Scripts/test-generated.sh
  linux:
    name: Linux (Swift ${{ matrix.swift }})
    strategy:
      fail-fast: false
      matrix:
        swift: ["6.2", "6.0"]
    runs-on: ubuntu-latest
    container: swift:${{ matrix.swift }}-jammy
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
      - name: Run Tests
        run: swift test
      - name: Compile Generated Code
        run: ./Scripts/test-generated.sh
