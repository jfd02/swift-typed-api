openapi: 3.1.0
info:
  title: MultipleSuccessResponses
  version: 1.0.0
paths:
  /pets:
    post:
      operationId: createPet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pet"
      responses:
        # 200 and 201 share the same schema but differ in description/examples.
        # They must be treated as a single, compatible success type.
        "200":
          description: An existing pet was returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "201":
          description: A new pet was created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        # 204 has no body and must not conflict with the content-bearing successes.
        "204":
          description: No content
        "409":
          description: Pet already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    Pet:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
    Error:
      type: object
      required: [message]
      properties:
        message:
          type: string
